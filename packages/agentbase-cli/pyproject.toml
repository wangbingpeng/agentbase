[project]
name = "agentbase-cli"
version = "0.1.0"
description = "AgentBase CLI tool"
requires-python = ">=3.11"
dependencies = [
    "agentbase-core>=0.1.0",
    "typer>=0.9",
    "rich>=13.0",
]

[project.scripts]
agentbase = "agentbase_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentbase_cli"]
