[project]
name = "agentbase-mcp"
version = "0.1.0"
description = "AgentBase MCP Server"
requires-python = ">=3.11"
dependencies = [
    "agentbase-sdk>=0.1.0",
    "mcp>=1.0",
]

[project.scripts]
agentbase-mcp = "agentbase_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentbase_mcp"]
