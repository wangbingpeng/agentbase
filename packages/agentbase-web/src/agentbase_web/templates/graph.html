{% extends "base.html" %}
{% block title %}Knowledge Graph - AgentBase{% endblock %}
{% block nav_graph %}active{% endblock %}

{% block content %}
<h1>Knowledge Graph <span class="count" id="graph-label"></span></h1>

<div class="graph-legend" id="graph-legend"></div>

<div class="graph-layout">
    <div class="graph-toolbar">
        <input type="text" id="graph-search" placeholder="Search entity..."
               onkeydown="if(event.key==='Enter') searchNode()">
        <button onclick="searchNode()">Find</button>
        <button onclick="resetZoom()" style="background:transparent;color:var(--primary);border:1px solid var(--primary)">Reset</button>
        <span id="graph-stats" class="graph-stats"></span>
    </div>
    <div class="graph-container">
        <div id="graph-svg" style="width:100%;height:100%"></div>
    </div>
    <div id="node-detail" class="node-detail" style="display:none">
        <h3 id="node-name"></h3>
        <p id="node-type"></p>
        <p id="node-desc"></p>
        <div class="linked-entries" id="linked-entries"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/graph.js"></script>
<script>
async function initGraph() {
    const resp = await fetch('/api/graph-data');
    const data = await resp.json();

    document.getElementById('graph-stats').textContent =
        `${data.nodes.length} nodes, ${data.edges.length} edges`;
    document.getElementById('graph-label').textContent =
        `(${data.nodes.length} entities, ${data.edges.length} relations)`;

    if (data.nodes.length === 0) {
        document.getElementById('graph-svg').innerHTML =
            '<p style="text-align:center;padding:60px;color:#94a3b8;font-size:14px">No entities found. Add entities to see the graph.</p>';
        return;
    }

    // Build legend from unique entity types
    const types = [...new Set(data.nodes.map(n => n.entity_type))];
    document.getElementById('graph-legend').innerHTML = types.map(t =>
        `<div class="legend-item"><div class="legend-dot" style="background:${AgentBaseGraph.getColor(t)}"></div>${t}</div>`
    ).join('');

    AgentBaseGraph.init('#graph-svg', data.nodes, data.edges);
}

function searchNode() {
    const name = document.getElementById('graph-search').value.trim();
    if (name) AgentBaseGraph.highlight(name);
}

function resetZoom() {
    AgentBaseGraph.reset();
}

initGraph();
</script>
{% endblock %}
