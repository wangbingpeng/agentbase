[project]
name = "agentbase-web"
version = "0.1.0"
description = "AgentBase Web Dashboard — Context & Memory Visualization"
requires-python = ">=3.11"
dependencies = [
    "agentbase-sdk>=0.1.0",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "jinja2>=3.1",
]

[project.scripts]
agentbase-web = "agentbase_web:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentbase_web"]
